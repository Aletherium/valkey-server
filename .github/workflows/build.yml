# .github/workflows/build.yml
name: Build Valkey

on:
  workflow_dispatch:
    inputs:
      valkey_tag:
        description: 'valkey-io/valkey tag to build (e.g. 9.0.3)'
        required: true
        default: '9.0.3'

permissions:
  contents: write

jobs:
  build-linux:
    # Linux binaries are built static against musl (Alpine). A musl-static
    # binary has no runtime NSS dlopen (the latent hole of glibc-static) and
    # runs on ANY Linux host — glibc or musl — with nothing installed. Both
    # arches go through the same Alpine path so no cross-toolchain drift can
    # appear between them.
    strategy:
      matrix:
        include:
          - arch: amd64
            alpine_arch: x86_64
          - arch: arm64
            alpine_arch: aarch64
    runs-on: ubuntu-22.04

    steps:
      - name: Set up QEMU (foreign arch only)
        if: matrix.alpine_arch != 'x86_64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Alpine (musl) build environment
        uses: jirutka/setup-alpine@v1
        with:
          arch: ${{ matrix.alpine_arch }}
          packages: build-base linux-headers pkgconf git bash

      - name: Clone and build (static musl)
        shell: alpine.sh {0}
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.valkey_tag }} https://github.com/valkey-io/valkey.git
          cd valkey
          # valkey's Makefile appends -rdynamic to the final link flags for
          # loadable-module symbol resolution. -rdynamic forces a dynamic
          # executable and silently defeats -static. We load no modules, so
          # strip -rdynamic to get a truly static binary.
          sed -i 's/-rdynamic//g' src/Makefile
          # -no-pie alongside -static: Alpine's gcc defaults to PIE, and the
          # implicit -pie overrides -static (yielding a dynamic PIE against
          # ld-musl). -no-pie removes that conflict so -static produces a
          # classic, fully static binary. V=1 prints the real link command.
          make -j"$(nproc)" V=1 \
            MALLOC=libc \
            BUILD_TLS=no \
            LDFLAGS="-static -no-pie" \
            noopt="" \
            valkey-server
          # Fail loudly if the result is not actually static: a dynamic
          # binary would silently reintroduce the host-library dependency
          # this whole build exists to remove. A static binary references
          # no .so; any .so line means the link was not static.
          if ldd src/valkey-server 2>&1 | grep -q '\.so'; then
            echo "ERROR: valkey-server is dynamically linked (expected static)" >&2
            ldd src/valkey-server >&2 || true
            exit 1
          fi

      - name: Prepare binary
        shell: alpine.sh {0}
        run: |
          FILENAME="valkey-server-linux-${{ matrix.arch }}"
          cp valkey/src/valkey-server "${FILENAME}"
          chmod 755 "${FILENAME}"
          sha256sum "${FILENAME}" > "${FILENAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: valkey-server-linux-${{ matrix.arch }}
          path: |
            valkey-server-linux-${{ matrix.arch }}
            valkey-server-linux-${{ matrix.arch }}.sha256

  build-macos:
    # macOS is self-contained by design: binaries link against libSystem,
    # which is always present. No static linking (Apple ships no static
    # libc) and none is needed.
    strategy:
      matrix:
        include:
          - arch: amd64
            extra_cflags: "-arch x86_64"
            extra_ldflags: "-arch x86_64"
          - arch: arm64
            extra_cflags: ""
            extra_ldflags: ""
    runs-on: macos-14

    steps:
      - name: Clone valkey-io/valkey
        run: git clone --depth 1 --branch ${{ github.event.inputs.valkey_tag }} https://github.com/valkey-io/valkey.git

      - name: Build
        run: |
          cd valkey
          make -j"$(sysctl -n hw.ncpu)" \
            MALLOC=libc \
            BUILD_TLS=no \
            CFLAGS="${{ matrix.extra_cflags }}" \
            LDFLAGS="${{ matrix.extra_ldflags }}" \
            noopt="" \
            valkey-server

      - name: Prepare binary
        run: |
          FILENAME="valkey-server-darwin-${{ matrix.arch }}"
          cp valkey/src/valkey-server "${FILENAME}"
          chmod 755 "${FILENAME}"
          shasum -a 256 "${FILENAME}" > "${FILENAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: valkey-server-darwin-${{ matrix.arch }}
          path: |
            valkey-server-darwin-${{ matrix.arch }}
            valkey-server-darwin-${{ matrix.arch }}.sha256

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.valkey_tag }}
          name: Valkey ${{ github.event.inputs.valkey_tag }}
          body: |
            Pre-built Valkey server binaries from [valkey-io/valkey](https://github.com/valkey-io/valkey) tag `${{ github.event.inputs.valkey_tag }}`.

            Linux binaries are statically linked against musl: they run on any
            Linux host (glibc or musl) with no system libraries installed.
            macOS binaries link against libSystem (always present).

            ## Platforms
            - `valkey-server-linux-amd64` — Linux x64 (static, musl)
            - `valkey-server-linux-arm64` — Linux ARM64 (static, musl)
            - `valkey-server-darwin-amd64` — macOS x64 (Intel)
            - `valkey-server-darwin-arm64` — macOS ARM64 (Apple Silicon)

            Windows is not supported — Valkey does not compile for Windows.
            On Windows, Gabion Framework uses in-memory rate limiting (single instance).

            ## Source
            Built from: https://github.com/valkey-io/valkey/tree/${{ github.event.inputs.valkey_tag }}

            ## License
            BSD 3-Clause License
          files: |
            valkey-server-*